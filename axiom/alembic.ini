# Alembic configuration for AXIOM.
#
# The database URL is NOT set here — env.py injects it from
# core.config.settings.database.sync_url, which honours AXIOM_DATABASE_URL
# (Postgres in production) and falls back to the local SQLite file otherwise.
# So `alembic upgrade head` targets whatever AXIOM itself is configured to use.
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

[post_write_hooks]

# Logging (standard Alembic template).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
