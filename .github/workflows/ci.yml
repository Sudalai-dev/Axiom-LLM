name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    defaults:
      run:
        working-directory: axiom
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx python-dotenv
          pip install -e .
      - name: Run tests
        run: |
          python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path.cwd())); import api.gateway; print('imports ok')"
          python -m pytest -q
